<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;">
  <title>KeyShield</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  
  <div id="home-view" class="view active">
    <div class="glass-panel">
      <div class="logo-container">
        <div class="shield-icon-wrapper">
          <svg class="shield-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <h1>KeyShield</h1>
      </div>
      <p class="subtitle">Safely clean your keyboard without accidental clicks.</p>
      
      <div class="timer-selection">
        <label>Lock Duration</label>
        <div class="timer-options">
          <button class="time-btn" data-time="30000">30s</button>
          <button class="time-btn active" data-time="60000">1m</button>
          <button class="time-btn" data-time="120000">2m</button>
          <button class="time-btn" data-time="300000">5m</button>
        </div>
      </div>

      <button id="lock-btn" class="primary-btn">
        <svg class="btn-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Lock Keyboard
      </button>
      
      <p class="disclaimer">Mouse will remain active to unlock.</p>
    </div>
  </div>

  <div id="lock-view" class="view">
    <div class="overlay-content">
      <div class="pulse-ring"></div>
      <div class="lock-status">
        <div class="shield-icon-wrapper large animate-glow">
          <svg class="shield-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <h2>Keyboard Locked</h2>
        <p>You can safely clean your keyboard now.</p>
      </div>
      
      <div class="countdown-container">
        <svg class="progress-ring" width="140" height="140">
          <circle class="progress-ring__circle" stroke="currentColor" stroke-width="5" fill="transparent" r="62" cx="70" cy="70"/>
        </svg>
        <div id="countdown-text" class="countdown-text">01:00</div>
      </div>

      <button id="unlock-btn" class="unlock-btn">
        <svg class="btn-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
        </svg>
        Click to Unlock
      </button>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
